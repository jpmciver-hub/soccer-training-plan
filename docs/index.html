function loadChecks() {
  try { return JSON.parse(localStorage.getItem('stp_checks') || '{}'); } catch { return {}; }
}
function saveChecks(c) { localStorage.setItem('stp_checks', JSON.stringify(c)); }
function getDateKey() { return new Date().toISOString().split('T')[0]; }

let checks = loadChecks();
let currentTab = 'schedule';
let currentDrill = null;
let soloMode = false;

// ═══════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function renderCheckbox(id, label, extra) {
  const dateKey = getDateKey();
  const key = dateKey + ':' + id;
  const checked = checks[key] || false;
  const wrapper = h('label', { className: `flex items-start gap-3 p-3 rounded-xl cursor-pointer transition-all ${checked ? 'bg-emerald-500/5' : 'hover:bg-white/[.02]'}` });
  const cb = h('input', { type:'checkbox', className:'mt-1 rounded border-gray-600 bg-surface-900 text-brand-500 focus:ring-brand-500/50 cursor-pointer flex-shrink-0' });
  cb.checked = checked;
  cb.addEventListener('change', () => {
    checks[key] = cb.checked;
    saveChecks(checks);
    textEl.className = cb.checked ? 'flex-1 check-done' : 'flex-1';
  });
  const textEl = h('div', { className: checked ? 'flex-1 check-done' : 'flex-1' });
  textEl.appendChild(h('div', { className:'text-sm font-semibold text-gray-200' }, label));
  if (extra) textEl.appendChild(extra);
  wrapper.appendChild(cb);
  wrapper.appendChild(textEl);
  return wrapper;
}

function renderDrillItem(drill) {
  const extra = h('div', { className:'mt-1 space-y-1' });
  if (drill.reps) extra.appendChild(h('div', { className:'text-xs text-gray-500' }, drill.reps));
  if (drill.time) extra.appendChild(h('div', { className:'text-xs text-gray-500' }, drill.time));
  if (drill.desc) extra.appendChild(h('div', { className:'text-xs text-gray-400 mt-1' }, drill.desc));
  if (drill.video) {
    const link = h('a', { href:drill.video, target:'_blank', rel:'noopener', className:'video-link mt-1' });
    link.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> ${drill.videoLabel || 'Watch Video'}`;
    extra.appendChild(link);
  }
  if (drill.solo === true && !soloMode) {
    extra.appendChild(h('span', { className:'solo-badge mt-1 inline-block' }, 'CAN DO SOLO'));
  }
  return renderCheckbox(drill.id, drill.name, extra);
}

function renderDrillPage(key) {
  const data = DRILLS[key];
  const page = h('div', { className:'space-y-4 fade-in' });

  // Header with back button
  const header = h('div', { className:'flex items-center gap-3' });
  const back = h('button', { className:'p-2 rounded-xl hover:bg-white/10 transition-colors text-gray-400', onClick: () => { currentTab = soloMode ? 'solo' : 'schedule'; render(); } });
  back.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>';
  header.appendChild(back);
  header.appendChild(h('div', null,
    h('h1', { className:'text-xl font-black text-white' }, `${data.icon} ${data.title}`),
    h('p', { className:'text-gray-500 text-xs' }, `${data.day} | ${data.duration}`)
  ));
  page.appendChild(header);

  // Principles (defending)
  if (data.principles) {
    const princ = h('div', { className:'glass p-4' });
    princ.appendChild(h('div', { className:'text-xs font-bold text-brand-400 uppercase tracking-wider mb-2' }, 'Key Principles'));
    const ol = h('ol', { className:'space-y-1 list-decimal list-inside' });
    data.principles.forEach(p => ol.appendChild(h('li', { className:'text-sm text-gray-300' }, p)));
    princ.appendChild(ol);
    page.appendChild(princ);
  }

  // Warm-up
  if (data.warmup.length) {
    const sec = h('div', { className:'glass p-4' });
    sec.appendChild(h('div', { className:'text-xs font-bold text-amber-400 uppercase tracking-wider mb-2' }, 'Warm-Up'));
    data.warmup.forEach(d => { if (!soloMode || d.solo) sec.appendChild(renderDrillItem(d)); });
    page.appendChild(sec);
  }

  // Blocks
  data.blocks.forEach(block => {
    const drillsToShow = soloMode ? block.drills.filter(d => d.solo) : block.drills;
    if (drillsToShow.length === 0) return;
    const sec = h('div', { className:'glass p-4' });
    const hdr = h('div', { className:'flex items-center justify-between mb-2' });
    hdr.appendChild(h('div', { className:'text-xs font-bold text-brand-400 uppercase tracking-wider' }, block.title));
    if (block.time) hdr.appendChild(h('div', { className:'text-xs text-gray-600' }, block.time));
    sec.appendChild(hdr);
    if (block.note) sec.appendChild(h('p', { className:'text-xs text-gray-500 mb-2 italic' }, block.note));
    drillsToShow.forEach(d => sec.appendChild(renderDrillItem(d)));
    page.appendChild(sec);
  });

  // Cool-down
  if (data.cooldown && data.cooldown.length) {
    const sec = h('div', { className:'glass p-4' });
    sec.appendChild(h('div', { className:'text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2' }, 'Cool-Down'));
    data.cooldown.forEach(d => { if (!soloMode || d.solo) sec.appendChild(renderDrillItem(d)); });
    page.appendChild(sec);
  }

  if (data.touchCount) {
    const tc = h('div', { className:'glass p-3 text-center' });

    page.appendChild(tc);
  }

  return page;
}

    if (d.cooldown) d.cooldown.forEach(x => allDrillIds.push(x.id));
  });
  SOLO_SESSIONS.forEach(s => s.drills.forEach(x => allDrillIds.push(x.id)));

  const todayDone = allDrillIds.filter(id => checks[dateKey + ':' + id]).length;

  const statCard = h('div', { className:'glass p-6 text-center' });
  statCard.appendChild(h('div', { className:'text-5xl font-black text-brand-400' }, String(todayDone)));
  statCard.appendChild(h('div', { className:'text-sm text-gray-500 mt-1' }, 'drills completed today'));
  page.appendChild(statCard);

  // Last 7 days
  const weekCard = h('div', { className:'glass p-4' });
  weekCard.appendChild(h('div', { className:'text-xs font-bold text-gray-400 uppercase tracking-wider mb-3' }, 'Last 7 Days'));
  const grid = h('div', { className:'grid grid-cols-7 gap-2' });
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const dk = d.toISOString().split('T')[0];
    const count = allDrillIds.filter(id => checks[dk + ':' + id]).length;
    const dayName = d.toLocaleDateString('en-US',{weekday:'short'});
    const col = h('div', { className:'text-center' });
    col.appendChild(h('div', { className:'text-[10px] text-gray-600' }, dayName));
    const circle = h('div', { className:`w-10 h-10 rounded-full flex items-center justify-center mx-auto mt-1 text-sm font-bold ${count > 0 ? 'bg-brand-600/30 text-brand-400' : 'bg-white/5 text-gray-600'}` }, String(count));
    col.appendChild(circle);
    grid.appendChild(col);
  }
  weekCard.appendChild(grid);
  page.appendChild(weekCard);

  // Reset today
  const resetBtn = h('button', { className:'w-full p-3 rounded-xl bg-red-600/10 hover:bg-red-600/20 text-red-400 text-sm font-semibold transition-all', onClick: () => {
    if (confirm('Reset all of today\'s checkmarks?')) {
      Object.keys(checks).forEach(k => { if (k.startsWith(dateKey)) delete checks[k]; });
      saveChecks(checks);
      render();
    }
  } }, 'Reset Today\'s Checkmarks');
  page.appendChild(resetBtn);

  return page;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Main content
  const main = h('div', { className:'max-w-lg mx-auto px-4 pt-4 pb-24 md:pb-8' });

  if (currentTab === 'drill' && currentDrill) {
    main.appendChild(renderDrillPage(currentDrill));
  } else if (currentTab === 'solo') {
    soloMode = false;
    main.appendChild(renderSoloPage());
  } else if (currentTab === 'progress') {
    main.appendChild(renderProgressPage());
  } else if (currentTab === 'resources') {
    main.appendChild(renderResourcesPage());
  } else {
    soloMode = false;
    main.appendChild(renderSchedule());
  }
  app.appendChild(main);

  // Bottom nav
  const nav = h('nav', { className:'fixed bottom-0 left-0 right-0 bg-surface-850/95 backdrop-blur-xl border-t border-white/5 z-40' });
  const navInner = h('div', { className:'max-w-lg mx-auto flex items-center justify-around py-2 px-2' });
  TABS.forEach(tab => {
    const isActive = (currentTab === tab.id) || (currentTab === 'drill' && tab.id === (soloMode ? 'solo' : 'schedule'));
    const btn = h('button', { className:`flex flex-col items-center gap-0.5 p-2 rounded-xl transition-all ${isActive ? 'tab-active' : 'text-gray-500'}`, onClick: () => {
      currentTab = tab.id;
      currentDrill = null;
      soloMode = false;
      render();
    }});
    btn.innerHTML = `<div>${tab.icon}</div><span class="text-[10px] font-medium">${tab.label}</span>`;
    navInner.appendChild(btn);
  });
  nav.appendChild(navInner);
  app.appendChild(nav);

  window.scrollTo(0,0);
}

render();
